<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <title>Hidden Gems Deluxe</title>
        <link rel="icon" type="image/png" sizes="128x128" href="favicon.png">
        <link rel="apple-touch-icon" href="favicon.png">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #000;
            }
            #loading-screen {
                position: fixed;
                inset: 0;
                z-index: 10;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
            }
            #loading-screen img {
                width: min(72vw, 320px);
                height: auto;
                image-rendering: auto;
            }
            #canvas {
                position: fixed;
                inset: 0;
                display: block;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                border: none;
                outline: none;
                touch-action: none;
                -webkit-touch-callout: none;
                user-select: none;
            }
        </style>
    </head>
    <body oncontextmenu="return false">
        <div id="loading-screen" aria-hidden="true">
            <img src="startup-logo.png" alt="Loading">
        </div>
        <canvas id="canvas"></canvas>
        <script>
            function fitCanvas() {
                var canvas = document.getElementById("canvas");
                var cssW = Math.max(1, window.innerWidth || document.documentElement.clientWidth || 1);
                var cssH = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
                var dpr = Math.max(1, window.devicePixelRatio || 1);
                canvas.style.width = cssW + "px";
                canvas.style.height = cssH + "px";
                canvas.width = Math.max(1, Math.round(cssW * dpr));
                canvas.height = Math.max(1, Math.round(cssH * dpr));
            }
            fitCanvas();
            window.addEventListener("resize", fitCanvas);
            window.addEventListener("load", function() {
                fitCanvas();
                main();
            });
        </script>
        <script type="text/javascript" charset="utf-8" src="app.js"></script>
    </body>
</html>
